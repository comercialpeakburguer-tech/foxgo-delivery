name: Build APK

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    name: Build Flutter APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.27.4"
          channel: stable
          cache: true

      - name: Get dependencies
        working-directory: flutter-app
        run: flutter pub get

      - name: Build debug APK
        working-directory: flutter-app
        run: flutter build apk --debug --no-tree-shake-icons

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: foxdelivery-debug-${{ github.run_number }}
          path: flutter-app/build/app/outputs/flutter-apk/app-debug.apk
          retention-days: 30

      - name: Build release APK (debug-signed)
        working-directory: flutter-app
        run: flutter build apk --release --no-tree-shake-icons

      - name: Upload release APK
        uses: actions/upload-artifact@v4
        with:
          name: foxdelivery-release-${{ github.run_number }}
          path: flutter-app/build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30
