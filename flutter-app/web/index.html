<!DOCTYPE html>
<html>
<head>
  <base href="/">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="Fox Delivery - plataforma de delivery online.">

  <!-- iOS meta tags & icons -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="Fox Delivery">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <meta name="google-signin-client_id" content="491987943015-agln6biv84krpnngdphj87jkko7r9lb8.apps.googleusercontent.com">

  <script type="text/javascript" src="https://appleid.cdn-apple.com/appleauth/static/jsapi/appleid/1/en_US/appleid.auth.js"></script>

  <title>Fox Delivery</title>
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" type="text/css" href="style.css">
  <script type="application/javascript" src="/assets/packages/flutter_inappwebview_web/assets/web/web_support.js" defer></script>

  <script>
    // The value below is injected by flutter build, do not touch.
    var serviceWorkerVersion = {{flutter_service_worker_version}};
  </script>
  <!-- This script adds the flutter initialization JS code -->
  <script src="flutter.js?version=3.9.0" defer></script>
</head>

<body>
  <!-- Google Maps JavaScript API for Flutter web maps. -->
  <script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyDO64AHR6gdyDKTlMjXl7zAYnKC1ruw6zg"></script>

  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-messaging.js"></script>

  <div class="preloader">
    <div class="preloader-container">
      <img width="50" class="preloader-img" src="favicon.png" alt="">
      <div class="loader"></div>
    </div>
  </div>

  <header class="header">
    <div class="header-container d-flex align-items-center justify-content-between">
      <div class="header-start d-flex gap-5 align-items-center">
        <img class="logo" src="logo.png" alt="">
        <div class="placeholder placeholder-wide"></div>
        <div class="placeholder"></div>
        <div class="placeholder"></div>
        <div class="placeholder"></div>
      </div>
      <div class="header-end d-flex gap-5">
        <div class="placeholder"></div>
        <div class="placeholder"></div>
        <div class="placeholder"></div>
      </div>
    </div>
  </header>

  <script>
    // Check if localStorage is supported in the browser
    if (typeof(Storage) !== "undefined") {
      var itemValue = localStorage.getItem("flutter.6ammart_theme");
      if (itemValue !== null) {
        if (itemValue === "true") {
          document.body.classList.add("theme-dark");
        } else {
          document.body.classList.remove("theme-light");
        }
      } else {
        console.log("Item not found in localStorage");
      }
    } else {
      console.log("localStorage is not supported in this browser");
    }
  </script>

  <script>
    document.querySelectorAll("img.svg").forEach(function (img) {
      var imgID = img.getAttribute("id");
      var imgClass = img.getAttribute("class");
      var imgURL = img.getAttribute("src");
      var xhr = new XMLHttpRequest();
      xhr.open("GET", imgURL, true);
      xhr.responseType = "document";
      xhr.onload = function () {
        if (xhr.status === 200) {
          var data = xhr.response;
          var svg = data.querySelector("svg");
          if (typeof imgID !== "undefined") {
            svg.setAttribute("id", imgID);
          }
          if (typeof imgClass !== "undefined") {
            svg.setAttribute("class", imgClass + " replaced-svg");
          }
          svg.removeAttribute("xmlns:a");
          if (!svg.getAttribute("viewBox") && svg.getAttribute("height") && svg.getAttribute("width")) {
            svg.setAttribute("viewBox", "0 0 " + svg.getAttribute("height") + " " + svg.getAttribute("width"));
          }
          img.parentNode.replaceChild(svg, img);
        }
      };
      xhr.send();
    });
  </script>

  <script>
    window.addEventListener('load', function(ev) {
      {{flutter_js}}
      {{flutter_build_config}}

      _flutter.loader.load({
        serviceWorker: {
          serviceWorkerVersion: {{flutter_service_worker_version}},
        },
        onEntrypointLoaded: function(engineInitializer) {
          let config = { renderer: 'html' };
          engineInitializer.initializeEngine(config).then(function(appRunner) {
            if(document.getElementById('splash')) {
              document.getElementById('splash').remove();
            }
            appRunner.runApp();
          });
        }
      });
    });
  </script>

  <script>
    function removePreloader() {
      const preloader = document.querySelector('.preloader');
      if (preloader) {
        preloader.remove();
      }
    }
  </script>

</body>
</html>
